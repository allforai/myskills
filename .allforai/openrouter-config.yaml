# OpenRouter MCP 用户配置
# 路径：.allforai/openrouter-config.yaml

# 自定义路由配置（可选）
# 如果需要覆盖 defaults.ts 中的默认路由，在这里配置
# 格式：task_type: model_family
# routing:
#   competitive_analysis: "gpt"
#   market_research: "gemini"

# 可用模型家族:
# - gpt (OpenAI GPT-4/4o)
# - gemini (Google Gemini)
# - deepseek (DeepSeek)
# - qwen (Alibaba Qwen)
# - claude (Anthropic Claude)
# - llama (Meta Llama)
